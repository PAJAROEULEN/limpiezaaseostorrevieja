<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Higiene Corporativa</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f4f7f9; 
            margin: 0; 
            padding: 0; 
            color: #2d3748;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .app-container { 
            width: 100%; 
            max-width: 480px; 
            background: #ffffff; 
            min-height: 100vh;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 24px;
            display: flex;
            flex-direction: column;
        }
        @media (min-width: 481px) {
            .app-container {
                min-height: auto;
                border-radius: 16px;
                margin: 40px 0;
            }
        }
        .header { 
            text-align: center; 
            margin-bottom: 24px; 
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 20px;
        }
        .header h1 { 
            font-size: 20px; 
            color: #1a365d; 
            margin: 0 0 6px 0; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .header p { 
            margin: 0; 
            color: #718096; 
            font-size: 14px; 
        }
        .status-banner {
            background-color: #ebf8ff;
            border-left: 4px solid #3182ce;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #2b6cb0;
        }
        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4a5568;
            margin: 0 0 16px 0;
            font-weight: 600;
        }
        .timeline {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .timeline-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 14px 16px; 
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px; 
        }
        .time-data {
            display: flex;
            flex-direction: column;
        }
        .date { 
            font-weight: 600; 
            font-size: 15px; 
            color: #1a202c; 
        }
        .time { 
            font-size: 13px; 
            color: #718096; 
            margin-top: 2px; 
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .badge { 
            background: #e6fffa; 
            color: #234e52; 
            padding: 6px 12px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 700; 
            border: 1px solid #b2f5ea;
        }
        .loading, .error-msg {
            text-align: center;
            padding: 40px 20px;
            color: #718096;
            font-size: 15px;
        }
        .error-msg { color: #e53e3e; }
        .footer {
            margin-top: auto;
            text-align: center;
            font-size: 11px;
            color: #a0aec0;
            padding-top: 40px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>✨ Control de Higiene e Inspección</h1>
        <p id="aseo-titulo">Registro de acceso público homologado</p>
    </div>
    
    <div class="status-banner">
        🔒 Datos sincronizados directamente con el sistema de calidad interno.
    </div>

    <h2 class="section-title">Últimas 5 intervenciones</h2>
    
    <div id="historial">
        <div class="loading">Sincronizando con la base de datos...</div>
    </div>
    
    <div class="footer">
        Sistema verificado • Cumplimiento de políticas corporativas
    </div>
</div>

<script>
// Envolvemos todo en un evento que espera a que el HTML esté totalmente listo
document.addEventListener("DOMContentLoaded", function() {
    
    // 1. Obtener el ID del aseo desde la URL del QR (?id=aseo111)
    const urlParams = new URLSearchParams(window.location.search);
    const idAseo = (urlParams.get('id') || "aseo111").toLowerCase();
    
    // Intentamos cambiar el título con protección para evitar el error "null"
    const elementoTitulo = document.getElementById("aseo-titulo");
    if (elementoTitulo) {
        elementoTitulo.innerText = `Código de Inspección: ${idAseo.toUpperCase()}`;
    }

    // 2. Apuntamos DIRECTAMENTE al archivo JSON local que genera tu Apps Script
    const jsonUrl = `./datos-${idAseo}.json?t=${new Date().getTime()}`;

    fetch(jsonUrl)
        .then(res => {
            if (!res.ok) throw new Error("Aseo sin registros recientes.");
            return res.json();
        })
        .then(registros => {
            if (!registros || registros.length === 0) {
                document.getElementById("historial").innerHTML = "<div class='loading'>No constan registros recientes para este aseo.</div>";
                return;
            }

            let html = '<div class="timeline">';
            registros.forEach(r => {
                html += `
                    <div class="timeline-item">
                        <div class="time-data">
                            <span class="date">${r.fecha}</span>
                            <span class="time">⏰ ${r.hora} h • ${r.servicio}</span>
                        </div>
                        <span class="badge">✓ Realizado</span>
                    </div>`;
            });
            html += '</div>';
            document.getElementById("historial").innerHTML = html;
        })
        .catch(err => {
            document.getElementById("historial").innerHTML = `
                <div class='loading' style='color:#718096; padding: 20px;'>
                    ℹ️ No constan limpiezas registradas hoy para el código ${idAseo.toUpperCase()}.
                </div>`;
        });
});
</script>
</body>
</html>
