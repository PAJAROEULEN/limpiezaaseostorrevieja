<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado de Higiene Certificado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-start justify-center md:p-8 antialiased">

<div class="bg-white w-full max-w-md min-h-screen md:min-height-0 md:rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col">
    
    <div class="flex justify-center mb-6">
      <img src="https://images2.imgbox.com/79/09/MUoSZnBV_o.jpg" 
           alt="Logotipo Eulen" 
           class="h-12 w-auto object-contain"/>
    </div>

    <div class="text-center pb-5 border-b border-slate-100 mb-6">
        <h1 class="text-lg font-bold text-slate-900 tracking-tight flex items-center justify-center gap-2">
            <i data-lucide="sparkles" class="text-blue-600 w-5 h-5"></i>
            Estado Sanitario de la Instalación
        </h1>
        <p id="aseo-titulo" class="inline-flex mt-2 text-xs font-bold text-blue-700 bg-blue-50 px-3 py-1 rounded-full tracking-wide uppercase">Cargando código...</p>
    </div>
    
    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Registro de las últimas 5 limpiezas</h2>
    
    <div id="historial" class="space-y-3">
        <div class="text-center py-8 text-sm text-slate-400 flex flex-col items-center justify-center gap-2">
            <div class="w-6 h-6 border-2 border-slate-200 border-t-slate-600 rounded-full animate-spin"></div>
            Sincronizando auditoría...
        </div>
    </div>
    
    <div class="mt-auto pt-6 border-t border-slate-100 text-center text-[11px] text-slate-400 flex items-center justify-center gap-1">
        <i data-lucide="shield-check" class="w-3.5 h-3.5 text-slate-400"></i>
        Garantía de Calidad y Trazabilidad de Servicio
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // 1. Inicializar iconos base
    lucide.createIcons();

    // 2. Capturar el código corto de la URL (?id=a37)
    const urlParams = new URLSearchParams(window.location.search);
    const idAseo = (urlParams.get('id') || "a37").toLowerCase().trim();
    
    // Ponemos un título temporal por si el JSON tarda en responder
    const elementoTitulo = document.getElementById("aseo-titulo");
    if (elementoTitulo) {
        elementoTitulo.innerText = `Aseo: ${idAseo.toUpperCase()}`;
    }

    // 3. Llamamos al JSON generado de forma asíncrona
    const jsonUrl = `./datos-${idAseo}.json?t=${new Date().getTime()}`;

    fetch(jsonUrl)
        .then(res => {
            if (!res.ok) throw new Error("Archivo no encontrado");
            return res.json();
        })
        .then(registros => {
            if (!registros || registros.length === 0) {
                document.getElementById("historial").innerHTML = `
                    <div class='text-center py-8 text-sm text-slate-400 bg-slate-50 border border-dashed border-slate-200 rounded-xl'>
                        No constan registros recientes.
                    </div>`;
                return;
            }

            // TRADUCCIÓN DINÁMICA: Si el JSON trae el nombre bonito, lo planchamos en el título
            if (elementoTitulo && registros[0] && registros[0].nombreReal) {
                elementoTitulo.innerText = registros[0].nombreReal;
            }

            // 4. Renderizar la línea de tiempo de limpiezas
            let html = '<div class="space-y-3">';
            registros.forEach(r => {
                const fechaTexto = r.fecha ? r.fecha : "Reciente";
                const horaTexto = r.hora ? `${r.hora} h` : "";
                const servicioTexto = r.servicio ? r.servicio.trim() : "Limpieza y Desinfección Estándar";

                // VALIDACIÓN: Comparamos si el servicio es estrictamente el estándar
                let badgeHtml = '';
                if (servicioTexto === "Limpieza y Desinfección Estándar") {
                    // Badge Verde si todo está OK
                    badgeHtml = `
                        <span class="inline-flex items-center gap-1 bg-emerald-50 text-emerald-700 border border-emerald-200 text-xs font-bold px-2.5 py-1 rounded-lg shrink-0">
                            <i data-lucide="check" class="w-3.5 h-3.5"></i> Conforme
                        </span>`;
                } else {
                    // Badge Naranja de Alerta si el operario escribió una observación/incidencia
                    badgeHtml = `
                        <span class="inline-flex items-center gap-1 bg-amber-50 text-amber-700 border border-amber-200 text-xs font-bold px-2.5 py-1 rounded-lg shrink-0">
                            <i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> Incidencia
                        </span>`;
                }

                html += `
                    <div class="flex justify-between items-center p-4 bg-slate-50 border border-slate-200/60 rounded-xl transition-all duration-200 hover:border-slate-300 gap-4">
                        <div class="flex flex-col gap-0.5 min-w-0">
                            <span class="font-bold text-sm text-slate-900">${fechaTexto} — ${horaTexto}</span>
                            <span class="text-xs text-slate-600 flex items-start gap-1 break-words">
                              <i data-lucide="activity" class="w-3 h-3 text-slate-400 mt-0.5 shrink-0"></i>
                              <span>${servicioTexto}</span>
                            </span>
                        </div>
                        ${badgeHtml}
                    </div>`;
            });
            html += '</div>';
            
            document.getElementById("historial").innerHTML = html;
            
            // Re-renderizar los iconos vectoriales de Lucide insertados por JS
            lucide.createIcons();
        })
        .catch(err => {
            console.log("Detalle del error fetch: ", err);
            document.getElementById("historial").innerHTML = `
                <div class='text-center py-8 text-xs font-medium text-slate-400 bg-slate-50/50 border border-dashed border-slate-200 rounded-xl p-4'>
                    ℹ️ No constan limpiezas registradas en las últimas horas para el código ${idAseo.toUpperCase()}.
                </div>`;
        });
});
</script>
</body>
</html>
